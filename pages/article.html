  <div class="content-wrap" style="max-width:860px;margin:0 auto;padding:0 32px 32px;"><div id="article-soundcloud" style="display:none;margin-top:-8px;"></div></div>
  <div id="site-footer"></div>

  <script>
    var API_URL = 'https://pbc-cms-production.up.railway.app';
    var params = new URLSearchParams(window.location.search);
    var articleId = params.get('id');
    if (!articleId) { window.location.href = 'news.html'; }
    else {
      fetch(API_URL + '/api/news/' + articleId)
        .then(function(r) { return r.json(); })
        .then(function(article) {
          if (!article || !article.headline) {
            
          // Build share URL for social media (server-rendered OG tags)
          var shareUrl = 'https://pbc-cms-production.up.railway.app/share/article/' + articleId + '?station=kahm';
          
          // Add share bar after article loads
          var shareBar = document.createElement('div');
          shareBar.style.cssText = 'display:flex;align-items:center;gap:10px;padding:16px 0;border-top:1px solid #e8ecf0;margin-top:24px;flex-wrap:wrap;';
          shareBar.innerHTML = '<span style="font-size:12px;font-weight:700;color:#546e7a;text-transform:uppercase;letter-spacing:.05em;">Share:</span>'
            + '<a href="https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(shareUrl)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#1877f2;color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;">Facebook</a>'
            + '<a href="https://twitter.com/intent/tweet?url='+encodeURIComponent(shareUrl)+'&text='+encodeURIComponent(article.headline)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#000;color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;">&#120143; / Twitter</a>'
            + '<button onclick="navigator.clipboard.writeText(\'' + shareUrl + '\').then(function(){this.textContent=\'✓ Copied!\';setTimeout(function(){document.querySelector(\'.share-copy-btn\').textContent=\'Copy Link\'},2000)}.bind(this))" class="share-copy-btn" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#487ea6;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;">Copy Link</button>';
          
          // Append share bar after article content renders
          setTimeout(function() {
            var wrap = document.querySelector('.article-wrap');
            if (wrap) wrap.appendChild(shareBar);
          }, 100);
          
          document.getElementById('article-content').innerHTML = '<div class="article-loading">Article not found.</div>';
            return;
          }
          document.title = article.headline + ' \u2014 KAHM FM 102.1';
          // Update Open Graph meta tags for social sharing
          var articleUrl = window.location.href;
          var shareUrl = 'https://pbc-cms-production.up.railway.app/share/article/' + articleId + '?station=kahm';
          var setMeta = function(id, val) { var el = document.getElementById(id); if (el && val) el.setAttribute('content', val); };
          setMeta('og-title-meta', article.headline + ' \u2014 KAHM FM 102.1');
          setMeta('og-desc-meta', (article.body || '').replace(/<[^>]+>/g, '').substring(0, 200));
          setMeta('og-url-meta', articleUrl);
          setMeta('tw-title-meta', article.headline + ' \u2014 KAHM FM 102.1');
          setMeta('tw-desc-meta', (article.body || '').replace(/<[^>]+>/g, '').substring(0, 200));
          if (imgSrc || (article.image && article.image.startsWith('http'))) {
            var fullImg = article.image && article.image.startsWith('http') ? article.image : (imgSrc || '');
            setMeta('og-image-meta', fullImg);
            setMeta('tw-image-meta', fullImg);
          }
          var imgSrc = article.image ? (article.image.startsWith('http') ? article.image : '../' + article.image) : ''; var img = imgSrc ? '<img class="article-img" src="' + imgSrc + '" alt="' + article.headline + '" />' : '';
          var date = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'}) : '';
          var author = article.author ? '<span>By ' + article.author + '</span>' : '';
          var body = (article.body || 'No content available.').split('\n').map(function(p) { return p ? '<p>' + p + '</p>' : ''; }).join('');
          
          // Build share URL for social media (server-rendered OG tags)
          var shareUrl = 'https://pbc-cms-production.up.railway.app/share/article/' + articleId + '?station=kahm';
          
          // Add share bar after article loads
          var shareBar = document.createElement('div');
          shareBar.style.cssText = 'display:flex;align-items:center;gap:10px;padding:16px 0;border-top:1px solid #e8ecf0;margin-top:24px;flex-wrap:wrap;';
          shareBar.innerHTML = '<span style="font-size:12px;font-weight:700;color:#546e7a;text-transform:uppercase;letter-spacing:.05em;">Share:</span>'
            + '<a href="https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(shareUrl)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#1877f2;color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;">Facebook</a>'
            + '<a href="https://twitter.com/intent/tweet?url='+encodeURIComponent(shareUrl)+'&text='+encodeURIComponent(article.headline)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#000;color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;">&#120143; / Twitter</a>'
            + '<button onclick="navigator.clipboard.writeText(\'' + shareUrl + '\').then(function(){this.textContent=\'✓ Copied!\';setTimeout(function(){document.querySelector(\'.share-copy-btn\').textContent=\'Copy Link\'},2000)}.bind(this))" class="share-copy-btn" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#487ea6;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;">Copy Link</button>';
          
          // Append share bar after article content renders
          setTimeout(function() {
            var wrap = document.querySelector('.article-wrap');
            if (wrap) wrap.appendChild(shareBar);
          }, 100);
          
          document.getElementById('article-content').innerHTML =
            '<div class="article-cat">' + (article.news_type || '') + '</div>'
            + '<h1 class="article-headline">' + article.headline + '</h1>'
            + '<div class="article-meta"><span>' + date + '</span>' + author + '</div>'
            + img
            + '<div class="article-body">' + body + '</div>';
          // SoundCloud embed + body below
          if (article.soundcloud_url) {
            var scEl = document.getElementById('article-soundcloud');
            if (scEl) {
              var embedUrl = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(article.soundcloud_url)
                + '&color=%23c0392b&auto_play=false&hide_related=true&show_comments=false&show_user=true&show_reposts=false&show_teaser=false';
              var belowHtml = '';
              if (article.body_below) {
                belowHtml = '<div class="article-body" style="margin-top:20px;">'
                  + article.body_below.split('\n').map(function(p){return p?'<p>'+p+'</p>':''}).join('')
                  + '</div>';
              }
              scEl.innerHTML = '<iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" src="' + embedUrl + '"></iframe>'
                + belowHtml;
              scEl.style.display = 'block';
            }
          } else if (article.body_below) {
            // No audio clip but has body_below — append to article body
            var scEl = document.getElementById('article-soundcloud');
            if (scEl) {
              scEl.innerHTML = '<div class="article-body">'
                + article.body_below.split('\n').map(function(p){return p?'<p>'+p+'</p>':''}).join('')
                + '</div>';
              scEl.style.display = 'block';
            }
          }
        })
        .catch(function() {
          
          // Build share URL for social media (server-rendered OG tags)
          var shareUrl = 'https://pbc-cms-production.up.railway.app/share/article/' + articleId + '?station=kahm';
          
          // Add share bar after article loads
          var shareBar = document.createElement('div');
          shareBar.style.cssText = 'display:flex;align-items:center;gap:10px;padding:16px 0;border-top:1px solid #e8ecf0;margin-top:24px;flex-wrap:wrap;';
          shareBar.innerHTML = '<span style="font-size:12px;font-weight:700;color:#546e7a;text-transform:uppercase;letter-spacing:.05em;">Share:</span>'
            + '<a href="https://www.facebook.com/sharer/sharer.php?u='+encodeURIComponent(shareUrl)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#1877f2;color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;">Facebook</a>'
            + '<a href="https://twitter.com/intent/tweet?url='+encodeURIComponent(shareUrl)+'&text='+encodeURIComponent(article.headline)+'" target="_blank" rel="noopener" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#000;color:#fff;border-radius:5px;font-size:12px;font-weight:700;text-decoration:none;">&#120143; / Twitter</a>'
            + '<button onclick="navigator.clipboard.writeText(\'' + shareUrl + '\').then(function(){this.textContent=\'✓ Copied!\';setTimeout(function(){document.querySelector(\'.share-copy-btn\').textContent=\'Copy Link\'},2000)}.bind(this))" class="share-copy-btn" style="display:inline-flex;align-items:center;gap:6px;padding:6px 14px;background:#487ea6;color:#fff;border:none;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;">Copy Link</button>';
          
          // Append share bar after article content renders
          setTimeout(function() {
            var wrap = document.querySelector('.article-wrap');
            if (wrap) wrap.appendChild(shareBar);
          }, 100);
          
          document.getElementById('article-content').innerHTML = '<div class="article-loading">Could not load article.</div>';
        });
    }
  </script>
