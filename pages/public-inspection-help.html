<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Public Inspection File Help — KYCA News Talk Radio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/kyca-base.css" /><link rel="stylesheet" href="../css/kyca.css" />
  <style id="nav-critical">
    nav.main-nav{background:#fff7ec !important;position:sticky !important;top:0 !important;z-index:9999 !important;}
    .main-nav-inner{width:100%;padding:0 48px;display:flex;align-items:center;justify-content:space-between;min-height:110px;}
    .nav-logo img{height:180px;width:auto;object-fit:contain;}
    @media(max-width:900px){.main-nav-inner{padding:0 20px;}}
    @media(max-width:640px){.nav-links-wrap{display:none !important;}.nav-hamburger{display:flex !important;}}
  </style>
</head>
<body class="kyca-inner">
  <div id="site-header"></div>
  <section class="hero"><img id="page-hero-img" src="" alt="Public Inspection File Help" class="page-hero-img" style="display:none;" /></section>
  <div class="content-wrap" style="max-width:1200px;margin:0 auto;padding:48px 32px;">
    <div id="pih-content"></div>
  </div>
  <div id="site-footer"></div>
  <script src="../js/theme.js"></script>
  <script src="../js/layout.js" data-depth="1"></script>
  <script src="../js/player.js"></script>
  <script>
  (function() {
    var API_URL = 'https://pbc-cms-production.up.railway.app';
    function resolveImg(src) {
      if (!src) return src;
      if (src.startsWith('http')) return src;
      if (src.startsWith('uploads/')) return API_URL + '/' + src;
      return '../' + src;
    }
    function renderSection(s, i) {
      var rev = (i % 2 === 1 && (s.type||'content') === 'content') ? ' reverse' : '';
      var hTag = s.heading_size || 'h2';
      var hSizes = {h1:'clamp(28px,4vw,48px)',h2:'clamp(22px,3vw,36px)',h3:'clamp(18px,2.5vw,26px)'};
      var hStyle = 'font-size:' + (hSizes[hTag]||hSizes.h2) + ';';
      if (s.heading_color) hStyle += 'color:' + s.heading_color + ';';
      var bodyHtml = s.body ? '<div style="font-size:15px;line-height:1.8;color:#444;">' + s.body.split('
').map(function(p){ return p ? '<p style="margin-bottom:1em;">' + p + '</p>' : ''; }).join('') + '</div>' : '';
      var imgHtml = s.image ? '<img src="' + resolveImg(s.image) + '" alt="' + (s.heading||'') + '" style="width:100%;border-radius:8px;object-fit:cover;max-height:360px;" />' : '';
      var ctaHtml = (s.cta_enabled !== false && s.cta_label) ? '<a href="../' + (s.cta_url||'#') + '" style="display:inline-flex;align-items:center;gap:8px;padding:12px 24px;background:#032a48;color:#fff;border-radius:8px;font-size:13px;font-weight:700;text-transform:uppercase;text-decoration:none;margin-top:8px;">' + s.cta_label + '</a>' : '';
      if (s.type === 'hero-header' || s.type === 'text-only') {
        return '<div style="padding:32px 0;">' + (s.heading ? '<' + hTag + ' style="' + hStyle + '">' + s.heading + '</' + hTag + '>' : '') + bodyHtml + ctaHtml + '</div>';
      }
      return '<div style="display:grid;grid-template-columns:1fr 1fr;gap:48px;align-items:center;padding:32px 0;direction:' + (rev ? 'rtl' : 'ltr') + '"><div style="direction:ltr">' + (s.heading ? '<' + hTag + ' style="' + hStyle + '">' + s.heading + '</' + hTag + '>' : '') + bodyHtml + ctaHtml + '</div>' + imgHtml + '</div>';
    }
    fetch(API_URL + '/api/pages/kyca-public-inspection-help')
      .then(function(r) { return r.json(); })
      .then(function(p) {
        if (p.hero_image) {
          var img = document.getElementById('page-hero-img');
          if (img) { img.src = resolveImg(p.hero_image); img.style.display = 'block'; }
        }
        if (p.sections) {
          var secs = JSON.parse(p.sections || '[]');
          document.getElementById('pih-content').innerHTML = secs.map(renderSection).join('');
        }
        if (p.bg_color) {
          var s = document.createElement('style');
          s.textContent = 'body{background:' + p.bg_color + ' !important}.content-wrap{background:' + p.bg_color + ' !important}';
          document.head.appendChild(s);
        }
      }).catch(function(){});
  })();
  </script>
</body>
</html>
